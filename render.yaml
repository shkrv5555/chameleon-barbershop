services:
  - type: web
    name: chameleon-barbershop
    env: node
    region: frankfurt
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "node chamilion-backend/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false
